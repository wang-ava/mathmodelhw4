<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人脸融合小页面</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f7f2;
      --surface: rgba(255, 255, 255, 0.86);
      --surface-soft: #eef3ed;
      --ink: #10150f;
      --muted: #637061;
      --line: rgba(16, 21, 15, 0.13);
      --accent: #00a66d;
      --accent-strong: #047a54;
      --coral: #ff6f59;
      --blue: #2878ff;
      --shadow: 0 24px 70px rgba(16, 21, 15, 0.14);
      --radius: 8px;
      --page-pad: clamp(16px, 3vw, 48px);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(0, 166, 109, 0.12), transparent 32%),
        linear-gradient(225deg, rgba(255, 111, 89, 0.1), transparent 34%),
        linear-gradient(90deg, rgba(16, 21, 15, 0.045) 1px, transparent 1px),
        linear-gradient(180deg, rgba(16, 21, 15, 0.045) 1px, transparent 1px),
        var(--bg);
      background-size: auto, auto, 34px 34px, 34px 34px, auto;
      font-family: Inter, "PingFang SC", "Microsoft YaHei", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 0 var(--page-pad);
      background: rgba(244, 247, 242, 0.78);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(18px);
    }

    .nav-inner {
      max-width: 1600px;
      min-height: 70px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    .brand,
    .nav-link {
      color: var(--ink);
      text-decoration: none;
      font-weight: 900;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      color: #fff;
      background: var(--ink);
      border-radius: var(--radius);
      font-weight: 900;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nav-link {
      min-height: 38px;
      display: inline-flex;
      align-items: center;
      padding: 0 14px;
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      font-size: 0.86rem;
    }

    .page {
      max-width: 1600px;
      margin: 0 auto;
      padding: clamp(28px, 5vw, 70px) var(--page-pad) 64px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 0.8fr) minmax(280px, 0.5fr);
      align-items: end;
      gap: clamp(18px, 4vw, 54px);
      margin-bottom: 24px;
    }

    .kicker {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.78);
      border: 1px solid var(--line);
      border-radius: 999px;
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.72rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    h1 {
      max-width: 960px;
      margin: 18px 0 0;
      font-size: clamp(3.3rem, 9vw, 8.8rem);
      line-height: 0.88;
      letter-spacing: 0;
      font-weight: 900;
    }

    h1 span {
      display: block;
      color: transparent;
      background: linear-gradient(120deg, #10150f 0 34%, #047a54 48%, #2878ff 76%, #ff6f59 100%);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .status {
      min-height: 58px;
      padding: 14px 16px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 14px 36px rgba(16, 21, 15, 0.08);
      font-weight: 750;
      line-height: 1.45;
    }

    .status.ready,
    .status.success {
      color: var(--accent-strong);
    }

    .status.busy {
      color: #9b6a08;
    }

    .status.error {
      color: #b93f2d;
    }

    .toolbar {
      margin: 0 0 16px;
      padding: 14px;
      display: grid;
      grid-template-columns: minmax(180px, 1fr) repeat(4, auto);
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .control {
      min-width: 0;
    }

    .label {
      display: block;
      margin-bottom: 6px;
      color: rgba(16, 21, 15, 0.64);
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    select,
    .btn {
      min-height: 42px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.82);
      border: 1px solid rgba(16, 21, 15, 0.16);
      border-radius: var(--radius);
      font-weight: 850;
    }

    select {
      width: 100%;
      padding: 0 12px;
    }

    .btn {
      padding: 0 16px;
      cursor: pointer;
      transition: transform 0.16s, background 0.16s, border-color 0.16s;
      white-space: nowrap;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      background: #fff;
      border-color: rgba(16, 21, 15, 0.28);
    }

    .btn.primary {
      color: #fff;
      background: var(--ink);
      border-color: var(--ink);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .range-row {
      min-width: min(240px, 100%);
      display: grid;
      grid-template-columns: minmax(120px, 1fr) 54px;
      align-items: center;
      gap: 10px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--ink);
    }

    .range-value {
      color: var(--accent-strong);
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.8rem;
      font-weight: 900;
      text-align: right;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: start;
    }

    .panel {
      min-width: 0;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .panel-header {
      min-height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 2px 2px 10px;
      border-bottom: 1px solid rgba(16, 21, 15, 0.1);
    }

    .panel-title {
      font-size: 0.88rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    .canvas-wrap {
      min-height: 360px;
      display: grid;
      place-items: center;
      margin-top: 12px;
      overflow: hidden;
      background:
        linear-gradient(45deg, rgba(16, 21, 15, 0.045) 25%, transparent 25%),
        linear-gradient(-45deg, rgba(16, 21, 15, 0.045) 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, rgba(16, 21, 15, 0.045) 75%),
        linear-gradient(-45deg, transparent 75%, rgba(16, 21, 15, 0.045) 75%),
        #edf3ea;
      background-size: 18px 18px;
      background-position: 0 0, 0 9px, 9px -9px, -9px 0;
      border: 1px solid rgba(16, 21, 15, 0.12);
      border-radius: var(--radius);
    }

    canvas {
      max-width: 100%;
      height: auto;
      display: block;
      background: #f7faf6;
      border-radius: 6px;
      box-shadow: 0 22px 48px rgba(16, 21, 15, 0.17);
    }

    .panel-actions {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .file-input {
      display: none;
    }

    .meta {
      min-height: 34px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.82rem;
      font-weight: 750;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }

    .comparison {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .comparison figure {
      margin: 0;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 14px 36px rgba(16, 21, 15, 0.08);
    }

    .comparison figcaption {
      margin-bottom: 10px;
      color: var(--ink);
      font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.74rem;
      font-weight: 900;
      text-transform: uppercase;
    }

    @media (max-width: 1100px) {
      .hero,
      .grid,
      .toolbar,
      .comparison {
        grid-template-columns: 1fr;
      }

      .toolbar {
        align-items: stretch;
      }
    }

    @media (max-width: 620px) {
      .nav-inner,
      .nav-actions {
        align-items: stretch;
        flex-direction: column;
      }

      .nav-link,
      .btn {
        justify-content: center;
        width: 100%;
      }

      h1 {
        font-size: clamp(2.8rem, 17vw, 5rem);
      }

      .canvas-wrap {
        min-height: 280px;
      }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a class="brand" href="index.html">
        <span class="brand-mark">∇</span>
        Poisson 图像融合
      </a>
      <div class="nav-actions">
        <a class="nav-link" href="index.html">返回主页面</a>
        <a class="nav-link" id="reportLink" href="report/option3_report.pdf">报告 PDF</a>
      </div>
    </div>
  </nav>

  <main class="page">
    <section class="hero">
      <div>
        <span class="kicker">Face Swap Lab</span>
        <h1><span>Face</span> Poisson blend.</h1>
      </div>
      <div id="status" class="status ready">请选择一组预设或上传图片。</div>
    </section>

    <section class="toolbar" aria-label="人脸融合控制">
      <div class="control">
        <label class="label" for="pairSelect">测试配对</label>
        <select id="pairSelect">
          <option value="face1">人物 A</option>
          <option value="face2">人物 B</option>
          <option value="face3">人物 C</option>
          <option value="face4">人物 D</option>
        </select>
      </div>
      <div class="control">
        <span class="label">融合程度</span>
        <div class="range-row">
          <input type="range" id="blendSlider" min="20" max="100" step="5" value="90">
          <span id="blendValue" class="range-value">90%</span>
        </div>
      </div>
      <button type="button" id="detectBtn" class="btn">检测人脸</button>
      <button type="button" id="blendBtn" class="btn primary" disabled>对齐融合</button>
      <button type="button" id="saveBtn" class="btn" disabled>保存结果</button>
    </section>

    <section class="grid" aria-label="人脸融合工作区">
      <article class="panel">
        <div class="panel-header">
          <span class="panel-title">源人脸</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="sourceCanvas" width="360" height="360"></canvas>
        </div>
        <div class="panel-actions">
          <button type="button" id="sourceUploadBtn" class="btn">上传源图</button>
          <button type="button" id="swapBtn" class="btn">交换</button>
          <input id="sourceUpload" class="file-input" type="file" accept="image/*">
        </div>
        <div id="sourceMeta" class="meta"></div>
      </article>

      <article class="panel">
        <div class="panel-header">
          <span class="panel-title">目标人脸</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="targetCanvas" width="360" height="360"></canvas>
        </div>
        <div class="panel-actions">
          <button type="button" id="targetUploadBtn" class="btn">上传目标图</button>
          <button type="button" id="landmarksBtn" class="btn">隐藏检测点</button>
          <input id="targetUpload" class="file-input" type="file" accept="image/*">
        </div>
        <div id="targetMeta" class="meta"></div>
      </article>

      <article class="panel">
        <div class="panel-header">
          <span class="panel-title">融合结果</span>
        </div>
        <div class="canvas-wrap">
          <canvas id="resultCanvas" width="360" height="360"></canvas>
        </div>
        <div id="resultMeta" class="meta"></div>
      </article>
    </section>

    <section class="comparison" aria-label="结果对比">
      <figure>
        <figcaption>Direct blend</figcaption>
        <canvas id="directCanvas" width="360" height="360"></canvas>
      </figure>
      <figure>
        <figcaption>Poisson blend</figcaption>
        <canvas id="poissonCanvas" width="360" height="360"></canvas>
      </figure>
    </section>
  </main>

  <script src="faceswap.js"></script>
</body>
</html>
